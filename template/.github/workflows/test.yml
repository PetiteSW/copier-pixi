name: Test


on:
  workflow_dispatch:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      coverage-report:
        default: false
        type: boolean
      checkout_ref:
        default: ''
        type: string
      pixi_frozen:
        default: true
        type: boolean
  workflow_call:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      coverage-report:
        default: false
        type: boolean
      checkout_ref:
        default: ''
        type: string

  # Nightly Test Schedules
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  test:
    runs-on: ${{ inputs.os-variant }}
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          frozen: ${{ inputs.pixi_frozen }}
          cache: true
      - run: pixi run test
      - uses: actions/upload-artifact@v6
        if: ${{ inputs.coverage-report }}
        with:
          name: CoverageReport
          path: coverage_html/
