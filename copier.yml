_subdirectory: template

projectname:
  type: str
  help: What is your project name? (i.e. Python package name)
reponame:
  default: '{{projectname}}'
  type: str
  help: What is your repository name?
prettyname:
  default: '{{projectname|capitalize}}'
  type: str
  help: What is your project name in title case?
orgname:
  default: ''
  type: str
  help: What is your organization name?
namespace_package:
  default: ''
  type: str
  help: Use a namespace package with this name. If empty, no namespace package is used.
description:
  type: str
  help: Brief description?
min_python:
  type: str
  help: Minimum Python version?
max_python:
  type: str
  help: Maximum Python version that is known to work?
year: 2026
nightly_deps:
  type: str
  help: |
    List of dependencies to install from GitHub during nightly builds,
    separated by commas. Make sure to also list transitive dependencies,
    otherwise their released versions will be used. Specify either a
    repository name or 'org/repo'. 'main' branch will be used. Example: dask/dask
community_contact_email:
  default: 'TODO: Fill Community Contact Email.'
  type: str
  help: |
    Contact email for the community. It will be rendered in the CODE_OF_CONDUCT.md file.
